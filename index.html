<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        :root {
            --bg: #0a0a0a;
            --fg: #f5f5f5;
            --accent: #ff3333;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            padding: 8vw 5vw;
            line-height: 1.5;
        }

        header {
            margin-bottom: 6rem;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent);
            margin-bottom: 2rem;
            margin-top: 4rem;
        }

        section {
            margin-bottom: 6rem;
            border-top: 2px solid #222;
            padding-top: 3rem;
            max-width: 900px;
        }

        p {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: #888;
            max-width: 700px;
            margin-bottom: 1.5rem;
        }

        a {
            color: var(--fg);
            text-decoration: none;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 2px;
            transition: all 0.2s ease;
        }

        a:hover {
            color: var(--bg);
            background-color: var(--accent);
        }

        .content-placeholder {
            min-height: 100px;
        }
    </style>
</head>
<body>
    <header>
        <h1></h1>
    </header>

    <main>
        <section id="about">
            <h2></h2>
            <div class="content-placeholder">
                <p></p>
            </div>
        </section>

        <section id="projects">
            <h2></h2>
            <div class="content-placeholder">
                <p></p>
            </div>
        </section>

        <section id="contact">
            <h2></h2>
            <div class="content-placeholder">
                <p></p>
            </div>
        </section>
    </main>
</body>
</html>
